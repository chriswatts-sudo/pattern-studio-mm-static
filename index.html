    if(recTimer){ clearTimeout(recTimer); recTimer = null; }
    if(recInterval){ clearInterval(recInterval); recInterval = null; }
    mediaRecorder = null;
    qs('recStatus').style.display = 'none';
    qs('exportMp4').textContent = 'MP4';
  };
  mediaRecorder.start(250);
  qs('recStatus').style.display = 'block';
  qs('recStatus').firstChild && (qs('recStatus').firstChild.textContent = `Recording ${fmt.label}…`);
  qs('exportMp4').textContent = 'STOP';
  const t0 = Date.now();
  recInterval = setInterval(() => {
    const el = (Date.now() - t0) / 1000;
    const pct = Math.min(el / duration * 100, 100);
    qs('recFill').style.width = pct + '%';
  }, 100);
  recTimer = setTimeout(() => {
    if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  }, duration * 1000);
});

/* ==================== BOLD DEPTH (procedural) — fully random each call ==================== */
// Picks one of 5 organic depth recipes at random per invocation: blobs,
// liquid_marble, splatter, ink_bloom, flow_field. Truly fresh each click.
function _mulberry(a){ return () => { a=(a+0x6D2B79F5)|0; let t=a; t=Math.imul(t^(t>>>15),t|1); t^=t+Math.imul(t^(t>>>7),t|61); return ((t^(t>>>14))>>>0)/4294967296; }; }
function _vn(x,y){
  const ix = Math.floor(x), iy = Math.floor(y), fx = x-ix, fy = y-iy;
  const h = (a,b) => ((Math.imul((a|0)*73856093 ^ (b|0)*19349663, 83492791))>>>0)/4294967295;
  const sx = fx*fx*(3-2*fx), sy = fy*fy*(3-2*fy);
  return (h(ix,iy)*(1-sx) + h(ix+1,iy)*sx)*(1-sy) + (h(ix,iy+1)*(1-sx) + h(ix+1,iy+1)*sx)*sy;
}
function _fbm(x, y, oct=4){ let s=0, a=0.5, f=1; for(let i=0;i<oct;i++){ s += _vn(x*f, y*f)*a; a*=0.5; f*=2; } return s; }
function _sharpen(v, k=2.0){ v = Math.max(0, Math.min(1, v)); return Math.pow(v, 1/k) / (Math.pow(v, 1/k) + Math.pow(1-v, 1/k)); }
function _normalize(raw){
  let mn=Infinity, mx=-Infinity;
  for(let i=0;i<raw.length;i++){ if(raw[i]<mn) mn=raw[i]; if(raw[i]>mx) mx=raw[i]; }
  const range = (mx-mn) || 1;
  const g = new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) g[i] = Math.max(0, Math.min(255, ((raw[i]-mn)/range)*255|0));
  return g;
}
function _depthBlobs(rnd, w, h){
  const raw = new Float32Array(w*h);
  const N = 4 + Math.floor(rnd()*4);
  const blobs = [];
  for(let i=0;i<N;i++) blobs.push({ cx:rnd()*1.4-0.2, cy:rnd()*1.4-0.2, r2:Math.pow(0.32+rnd()*0.55,2), amp:(rnd()<0.5?-1:1)*(0.85+rnd()*1.1) });
  const gx = (rnd()-0.5)*2.5, gy = (rnd()-0.5)*2.5;
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    const u=x/w, v=y/h; let s = 0.5 + u*gx + v*gy;
    for(const b of blobs){ const dx=u-b.cx, dy=v-b.cy; s += b.amp*Math.exp(-(dx*dx+dy*dy)/b.r2); }
    raw[y*w+x] = s;
  }
  return _normalize(raw);
}
function _depthLiquid(rnd, w, h){
  const sX=rnd()*1000, sY=rnd()*1000, sc=1.8+rnd()*1.4, wp=1.5+rnd()*1.5;
  const raw = new Float32Array(w*h);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    const u=x/w*sc+sX, v=y/h*sc+sY;
    const qx = _fbm(u, v, 4), qy = _fbm(u+5.2, v+1.3, 4);
    raw[y*w+x] = _sharpen(_fbm(u+qx*wp, v+qy*wp, 5), 1.6);
  }
  return _normalize(raw);
}
function _depthSplatter(rnd, w, h){
  const N = 8 + Math.floor(rnd()*8);
  const bl = [];
  for(let i=0;i<N;i++) bl.push({ cx:rnd(), cy:rnd(), r2:Math.pow(0.05+rnd()*0.18,2), amp:(rnd()<0.5?-1:1)*(0.6+rnd()*0.9), ang:rnd()*Math.PI, sq:0.5+rnd()*1.0 });
  const sX=rnd()*100, sY=rnd()*100;
  const raw = new Float32Array(w*h);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    const u=x/w, v=y/h; let s = 0.5;
    for(const b of bl){
      const du=u-b.cx, dv=v-b.cy;
      const ru =  du*Math.cos(b.ang) + dv*Math.sin(b.ang);
      const rv = (-du*Math.sin(b.ang) + dv*Math.cos(b.ang)) * b.sq;
      const wb = _fbm(u*3.5+sX, v*3.5+sY, 3) * 0.4;
      s += b.amp * Math.exp(-(ru*ru + rv*rv) / b.r2 * (1+wb));
    }
    raw[y*w+x] = _sharpen(s, 1.4);
  }
  return _normalize(raw);
}
function _depthInkBloom(rnd, w, h){
  const sX=rnd()*1000, sY=rnd()*1000, sc=2.4+rnd()*1.5;
  const dr = [];
  const N = 3 + Math.floor(rnd()*3);
  for(let i=0;i<N;i++) dr.push({ cx:0.15+rnd()*0.7, cy:0.15+rnd()*0.7, r:0.18+rnd()*0.2, amp:0.6+rnd()*0.6, ang:rnd()*Math.PI, sq:0.6+rnd()*0.8 });
  const raw = new Float32Array(w*h);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    const u=x/w, v=y/h;
    const nx = _fbm(u*sc+sX, v*sc+sY, 4)*0.18;
    const ny = _fbm(u*sc+sX+7.1, v*sc+sY+3.7, 4)*0.18;
    let s = 0;
    for(const d of dr){
      const du = u+nx-d.cx, dv = v+ny-d.cy;
      const ru =  du*Math.cos(d.ang) + dv*Math.sin(d.ang);
      const rv = (-du*Math.sin(d.ang) + dv*Math.cos(d.ang))*d.sq;
      const dist = Math.sqrt(ru*ru + rv*rv);
      s += d.amp * Math.exp(-Math.pow(dist/d.r, 1.7));
    }
    s += _fbm(u*4+sX, v*4+sY, 3)*0.15;
    raw[y*w+x] = _sharpen(s, 1.8);
  }
  return _normalize(raw);
}
function _depthCloud(rnd, w, h){
  const sX=rnd()*1000, sY=rnd()*1000, sc=1.6+rnd()*1.6;
  const raw = new Float32Array(w*h);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    const u=x/w*sc+sX, v=y/h*sc+sY;
    const rg = 1 - Math.abs(2*_fbm(u, v, 5) - 1);
    const f = _fbm(u*1.7+12.4, v*1.7+8.1, 4);
    raw[y*w+x] = _sharpen(rg*0.7 + f*0.5, 1.5);
  }
  return _normalize(raw);
}

// Random pick + truly random RNG seed each call
function generateBoldDepth(){
  const fns = [_depthBlobs, _depthLiquid, _depthSplatter, _depthInkBloom, _depthCloud];
  const rnd = _mulberry((Math.random()*0xffffffff) >>> 0);
  const fn  = fns[Math.floor(rnd() * fns.length)];
  const w = 512, h = 512;
  return { gray: fn(rnd, w, h), w, h, kind: fn.name.replace('_depth','').toLowerCase() };
}
/* ==================== GRADIENT DEPTH (simple B/W gradients) ==================== */
// Pure linear or radial gradients — useful as a clean depth source for patterns.
// Adapts to the currently-selected output aspect.
function _gradientDims(){
  const preset = qs('sizePreset')?.value || 'native';
  if(preset === 'native') return { w: 512, h: 512 };
  const [pw, ph] = preset.split('x').map(Number);
  const aspect = pw / ph;
  if(aspect >= 1) return { w: 768, h: Math.round(768 / aspect) };
  return { h: 768, w: Math.round(768 * aspect) };
}
function generateGradientDepth(kind, angleDeg){
  const { w, h } = _gradientDims();
  const gray = new Uint8Array(w*h);
  const ang = (angleDeg || 0) * Math.PI / 180;
  const cx = w * 0.5, cy = h * 0.5;
  const maxR = Math.sqrt(cx*cx + cy*cy);
  if(kind === 'linear'){
    // Project (x,y) onto angle vector
    const dx = Math.cos(ang), dy = Math.sin(ang);
    // Range of projection across the image
    const corners = [[0,0],[w,0],[0,h],[w,h]];
    let pmin = Infinity, pmax = -Infinity;
    for(const [px,py] of corners){ const p = px*dx + py*dy; if(p<pmin) pmin=p; if(p>pmax) pmax=p; }
    const range = (pmax-pmin) || 1;
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      const t = ((x*dx + y*dy) - pmin) / range;
      gray[y*w+x] = Math.max(0, Math.min(255, (t*255)|0));
    }
  } else if(kind === 'radial'){
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      const dx = x - cx, dy = y - cy;
      const r = Math.sqrt(dx*dx + dy*dy) / maxR;
      gray[y*w+x] = Math.max(0, Math.min(255, ((1 - r) * 255) | 0));
    }
  } else if(kind === 'radial_inverse'){
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
      const dx = x - cx, dy = y - cy;
      const r = Math.sqrt(dx*dx + dy*dy) / maxR;
      gray[y*w+x] = Math.max(0, Math.min(255, (r * 255) | 0));
    }
  }
  return { gray, w, h };
}
function loadGradientDepth(kind, angleDeg){
  const d = generateGradientDepth(kind, angleDeg);
  depthRaw = d.gray;
  storeOriginalDepth(d.gray, d.w, d.h);
  uploadDepthCovering(d.gray, d.w, d.h);
  const label = kind === 'linear' ? `Linear gradient (${angleDeg||0}°)` : (kind === 'radial' ? 'Radial gradient' : 'Radial inverse');
  setStatus(`${label} · ${d.w}×${d.h}`, 'ok');
  if(!animateEl.checked) renderPasses();
}
// Unified procedural-depth dropdown — fires either Bold blobs or one of the gradients
function _triggerBoldDepth(){
  const d = generateBoldDepth();
  depthRaw = d.gray;
  storeOriginalDepth(d.gray, d.w, d.h);
  uploadDepthCovering(d.gray, d.w, d.h);
  setStatus(`Bold depth · ${d.kind} · ${d.w}×${d.h} · click again for a different one`, 'ok');
  if(!animateEl.checked) renderPasses();
}
qs('procSelect')?.addEventListener('change', function(){
  switch(this.value){
    case 'bold':       _triggerBoldDepth(); break;
    case 'linear-v':   loadGradientDepth('linear', 90); break;
    case 'linear-h':   loadGradientDepth('linear', 0);  break;
    case 'linear-d':   loadGradientDepth('linear', 45); break;
    case 'radial':     loadGradientDepth('radial');     break;
    case 'radial-inv': loadGradientDepth('radial_inverse'); break;
  }
  this.value = '';
});

/* ==================== STAGE METADATA LABEL ==================== */
// The canvas itself now represents the artboard (no overlay frame needed).
// We just label its dimensions above the canvas.
function updatePatternFrame(w, h){
  if(!w || !h){ w = outCv.width || 512; h = outCv.height || 512; }
  const meta = qs('stageMeta');
  if(meta) meta.textContent = `${w} × ${h}`;
  // Set the display size of the canvas so it preserves aspect ratio inside
  // the stage but never overflows the available area.
  const stage = outCv?.parentElement;
  if(!stage) return;
  const padX = 48, padY = 60; // breathing room around the canvas
  const availW = Math.max(80, stage.clientWidth  - padX);
  const availH = Math.max(80, stage.clientHeight - padY);
  const aspect = w / h;
  let dw, dh;
  if(availW / availH > aspect){ dh = availH; dw = dh * aspect; }
  else                         { dw = availW; dh = dw / aspect; }
  outCv.style.width  = dw + 'px';
  outCv.style.height = dh + 'px';
}
window.addEventListener('resize', () => updatePatternFrame());
requestAnimationFrame(() => updatePatternFrame());

setStatus('Upload an image or click AI Generate', '');

// Expose internals for batch-tooling / automation use
window.__mm = {
  uploadDepth, renderPasses,
  get depthRaw(){return depthRaw}, set depthRaw(v){depthRaw=v},
  PALETTES,
  setPattern(p){ selectedPattern = p; [...qs('patternGrid').children].forEach(b => b.classList.toggle('active', b.dataset.pattern === p)); },
  // Inject a named MM palette and activate it (no permanent entry — uses temporary key)
  setMMPalette(colors, stops){
    const key = 'TEMP_MM';
    PALETTES[key] = { name: 'MM', colors: colors.slice(), userStops: stops.slice() };
    selectedPaletteKey = key;
    // Force user stops mode so our stops apply
    qs('stopsMode').value = 'user';
  },
};
</script>
</body>
</html>
